name: Build

on:
  schedule:
    - cron: '42 6 * * 1-5'
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-jira token | GITHUB_TOKEN;
            development/kv/data/slack token | SLACK_TOKEN;
            development/kv/data/jira user   | JIRA_USER;
            development/kv/data/jira token  | JIRA_TOKEN;
            development/kv/data/rootly ro-api-key | ROOTLY_TOKEN;

      - name: Validate committed production dependencies
        run: npm run check-dependencies

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
          SLACK_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SLACK_TOKEN }}
          JIRA_USER: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_USER }}
          JIRA_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_TOKEN }}
          ROOTLY_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ROOTLY_TOKEN }}
        # Do not run test/Data/TeamConfiguration.test.js to avoid blocked PRs due to changes in Jira
        run: npm run test-uts

  data-consistency-check:
    name: Data Consistency Check
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-jira token | GITHUB_TOKEN;
            development/kv/data/jira user   | JIRA_USER;
            development/kv/data/jira token  | JIRA_TOKEN;
            development/kv/data/rootly ro-api-key | ROOTLY_TOKEN;

      - name: Run Data Consistency Check
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
          JIRA_USER: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_USER }}
          JIRA_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).JIRA_TOKEN }}
          ROOTLY_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ROOTLY_TOKEN }}
        # Run test/Data/TeamConfiguration.test.js separately to narrow down the necessary change. This check is not required on PRs to pass
        run: npm run test-data
