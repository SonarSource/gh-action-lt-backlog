name: 'Move card after merging a pull request'
description: 'Move fixed Jira tickets using the "Merge into branch" or "Merge into master" transition after merging the pull request.'
inputs:
  github-token:
    description: 'GitHub auth Token'
    required: true
  jira-user:
    description: 'Jira auth User'
    required: true
  jira-token:
    description: 'Jira auth Token'
    required: true
  is-eng-xp-squad:
    description: 'Repo is owned by Engineering Experience Squad'
    required: false
    default: 'false'
  fix-version:
    description: 'Jira fix version name to set on merge, such as 10.23, or autodetect-lowest. Leave empty to skip.'
    required: false
    default: ''
runs:
  using: 'node24'
  main: '../dist/PullRequestClosed/Index.js'
